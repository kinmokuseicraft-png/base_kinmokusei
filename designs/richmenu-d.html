<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>金杢犀 リッチメニュー 案D — 金沢城×桜（紺碧×白）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 2500px;
  height: 1686px;
  overflow: hidden;
  font-family: 'Noto Serif JP', 'Hiragino Mincho ProN', serif;
}

/* ====== 背景: 金沢の空 ====== */
.sky {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    180deg,
    #3A6E9E 0%,
    #5A92C0 30%,
    #7AAFE0 60%,
    #8BBDE8 100%
  );
}

/* 瓦パターン（屋根の質感） */
.kawara {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 80px;
  background:
    repeating-linear-gradient(
      90deg,
      rgba(18,28,45,0.9) 0px, rgba(18,28,45,0.9) 2px,
      transparent 2px, transparent 60px
    ),
    linear-gradient(180deg, #141E2D 0%, #1A2535 60%, #243040 100%);
  z-index: 3;
}
.kawara-edge {
  position: absolute;
  top: 72px; left: 0; right: 0;
  height: 16px;
  background: linear-gradient(180deg, #1A2535, transparent);
  z-index: 3;
}

/* 石垣テクスチャ（下部） */
.ishigaki {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 120px;
  background:
    repeating-linear-gradient(
      88deg,
      rgba(80,65,50,0.15) 0px, rgba(80,65,50,0.15) 1px,
      transparent 1px, transparent 80px
    ),
    repeating-linear-gradient(
      180deg,
      rgba(80,65,50,0.1) 0px, rgba(80,65,50,0.1) 1px,
      transparent 1px, transparent 40px
    ),
    linear-gradient(180deg, transparent 0%, rgba(60,45,30,0.7) 100%);
  z-index: 3;
}

/* 桜の花びら浮遊（装飾） */
.sakura-petal {
  position: absolute;
  z-index: 2;
  opacity: 0.55;
}

/* ====== グリッド ====== */
.grid {
  position: relative;
  z-index: 5;
  display: grid;
  grid-template-columns: 833px 834px 833px;
  grid-template-rows: 843px 843px;
  width: 2500px;
  height: 1686px;
}

.cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 50px;
  border-right: 1px solid rgba(255,255,255,0.25);
  border-bottom: 1px solid rgba(255,255,255,0.25);
  position: relative;
  overflow: hidden;
  /* 城壁の白さ — 白い霧 */
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(2px);
}

.cell:nth-child(3n)  { border-right: none; }
.cell:nth-child(n+4) { border-bottom: none; }

/* ホバー感（印刷上は効果なし） */
.cell:hover {
  background: rgba(255,255,255,0.15);
}

/* 城壁パネル（ボタンの主体） */
.panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 620px;
  padding: 52px 40px 48px;
  background: rgba(255,255,255,0.18);
  border: 1.5px solid rgba(255,255,255,0.45);
  position: relative;
}

/* パネルの四隅に瓦風の小さな飾り */
.panel::before, .panel::after {
  content: '';
  position: absolute;
  width: 18px; height: 18px;
  border-color: rgba(255,255,255,0.6);
  border-style: solid;
}
.panel::before {
  top: -1px; left: -1px;
  border-width: 2px 0 0 2px;
}
.panel::after {
  bottom: -1px; right: -1px;
  border-width: 0 2px 2px 0;
}

.icon { margin-bottom: 36px; }

.label-jp {
  font-size: 82px;
  font-weight: 700;
  color: #FFFFFF;
  letter-spacing: 0.12em;
  margin-bottom: 18px;
  text-shadow: 0 2px 20px rgba(20,30,50,0.3);
}

.rule {
  width: 160px;
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(255,255,255,0.7), transparent);
  margin-bottom: 18px;
}

.label-en {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 30px;
  font-weight: 300;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.7);
  margin-bottom: 18px;
}

.sub-desc {
  font-size: 34px;
  font-weight: 300;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.08em;
}

/* 桜のアクセント色 */
.sakura-accent {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #F4B8C8;
  margin-bottom: 22px;
  box-shadow: 0 0 12px rgba(244,184,200,0.8);
}
</style>
</head>
<body>

<!-- 背景レイヤー -->
<div class="sky"></div>

<!-- 瓦屋根 -->
<div class="kawara"></div>
<div class="kawara-edge"></div>

<!-- 石垣 -->
<div class="ishigaki"></div>

<!-- 桜の花びら（SVGで配置） -->
<svg class="sakura-petal" style="top:90px; left:80px;" width="220" height="180" viewBox="0 0 220 180" fill="none">
  <ellipse cx="110" cy="60" rx="18" ry="28" fill="#F9D7E2" opacity="0.7" transform="rotate(0 110 90)"/>
  <ellipse cx="110" cy="60" rx="18" ry="28" fill="#F9D7E2" opacity="0.7" transform="rotate(72 110 90)"/>
  <ellipse cx="110" cy="60" rx="18" ry="28" fill="#F9D7E2" opacity="0.7" transform="rotate(144 110 90)"/>
  <ellipse cx="110" cy="60" rx="18" ry="28" fill="#F9D7E2" opacity="0.7" transform="rotate(216 110 90)"/>
  <ellipse cx="110" cy="60" rx="18" ry="28" fill="#F9D7E2" opacity="0.7" transform="rotate(288 110 90)"/>
  <circle cx="110" cy="90" r="8" fill="#F4B8C8" opacity="0.8"/>
</svg>

<svg class="sakura-petal" style="top:95px; left:320px;" width="140" height="140" viewBox="0 0 140 140" fill="none">
  <ellipse cx="70" cy="30" rx="12" ry="22" fill="#F9D7E2" opacity="0.6" transform="rotate(0 70 70)"/>
  <ellipse cx="70" cy="30" rx="12" ry="22" fill="#F9D7E2" opacity="0.6" transform="rotate(72 70 70)"/>
  <ellipse cx="70" cy="30" rx="12" ry="22" fill="#F9D7E2" opacity="0.6" transform="rotate(144 70 70)"/>
  <ellipse cx="70" cy="30" rx="12" ry="22" fill="#F9D7E2" opacity="0.6" transform="rotate(216 70 70)"/>
  <ellipse cx="70" cy="30" rx="12" ry="22" fill="#F9D7E2" opacity="0.6" transform="rotate(288 70 70)"/>
  <circle cx="70" cy="70" r="6" fill="#F4B8C8" opacity="0.7"/>
</svg>

<svg class="sakura-petal" style="top:100px; right:100px;" width="170" height="170" viewBox="0 0 170 170" fill="none">
  <ellipse cx="85" cy="38" rx="14" ry="24" fill="#F9D7E2" opacity="0.65" transform="rotate(0 85 85)"/>
  <ellipse cx="85" cy="38" rx="14" ry="24" fill="#F9D7E2" opacity="0.65" transform="rotate(72 85 85)"/>
  <ellipse cx="85" cy="38" rx="14" ry="24" fill="#F9D7E2" opacity="0.65" transform="rotate(144 85 85)"/>
  <ellipse cx="85" cy="38" rx="14" ry="24" fill="#F9D7E2" opacity="0.65" transform="rotate(216 85 85)"/>
  <ellipse cx="85" cy="38" rx="14" ry="24" fill="#F9D7E2" opacity="0.65" transform="rotate(288 85 85)"/>
  <circle cx="85" cy="85" r="7" fill="#F4B8C8" opacity="0.75"/>
</svg>

<!-- 散る花びら（小さい、ランダム配置） -->
<svg class="sakura-petal" style="top:200px; left:700px; transform:rotate(25deg);" width="60" height="50" viewBox="0 0 60 50" fill="none">
  <ellipse cx="30" cy="25" rx="28" ry="20" fill="#F9D7E2" opacity="0.5"/>
</svg>
<svg class="sakura-petal" style="top:160px; right:400px; transform:rotate(-15deg);" width="50" height="42" viewBox="0 0 50 42" fill="none">
  <ellipse cx="25" cy="21" rx="23" ry="18" fill="#F9D7E2" opacity="0.45"/>
</svg>
<svg class="sakura-petal" style="top:130px; left:1200px; transform:rotate(40deg);" width="44" height="36" viewBox="0 0 44 36" fill="none">
  <ellipse cx="22" cy="18" rx="20" ry="15" fill="#F9D7E2" opacity="0.4"/>
</svg>

<!-- グリッド -->
<div class="grid">

  <!-- ① 銘木診断 -->
  <div class="cell">
    <div class="panel">
      <div class="sakura-accent"></div>
      <div class="icon">
        <svg width="90" height="90" viewBox="0 0 100 100" fill="none">
          <polygon points="50,6 94,50 50,94 6,50" stroke="rgba(255,255,255,0.85)" stroke-width="2"/>
          <polygon points="50,20 80,50 50,80 20,50" stroke="rgba(255,255,255,0.35)" stroke-width="1.2"/>
          <circle cx="50" cy="50" r="4" fill="white" opacity="0.8"/>
          <line x1="50" y1="6"  x2="50" y2="20" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
          <line x1="50" y1="80" x2="50" y2="94" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
          <line x1="6"  y1="50" x2="20" y2="50" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
          <line x1="80" y1="50" x2="94" y2="50" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
        </svg>
      </div>
      <div class="label-jp">銘木診断</div>
      <div class="rule"></div>
      <div class="label-en">Mokuzan Shindan</div>
      <div class="sub-desc">あなたの木を見つける</div>
    </div>
  </div>

  <!-- ② ショップ -->
  <div class="cell">
    <div class="panel">
      <div class="sakura-accent"></div>
      <div class="icon">
        <svg width="90" height="90" viewBox="0 0 100 100" fill="none">
          <rect x="10" y="36" width="80" height="56" rx="2" stroke="rgba(255,255,255,0.85)" stroke-width="2"/>
          <path d="M30,36 Q30,14 50,14 Q70,14 70,36" stroke="rgba(255,255,255,0.85)" stroke-width="2" stroke-linecap="round"/>
          <line x1="34" y1="59" x2="66" y2="59" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
        </svg>
      </div>
      <div class="label-jp">ショップ</div>
      <div class="rule"></div>
      <div class="label-en">Online Shop</div>
      <div class="sub-desc">全ての作品を見る</div>
    </div>
  </div>

  <!-- ③ 銘木図鑑 -->
  <div class="cell">
    <div class="panel">
      <div class="sakura-accent"></div>
      <div class="icon">
        <svg width="90" height="90" viewBox="0 0 100 100" fill="none">
          <path d="M12,14 L12,86 Q50,74 50,74 Q50,74 88,86 L88,14 Q50,26 50,26 Q50,25 12,14 Z" stroke="rgba(255,255,255,0.85)" stroke-width="2"/>
          <line x1="50" y1="26" x2="50" y2="74" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
          <line x1="20" y1="40" x2="46" y2="43" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
          <line x1="20" y1="55" x2="46" y2="58" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
          <line x1="54" y1="43" x2="80" y2="40" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
          <line x1="54" y1="58" x2="80" y2="55" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
        </svg>
      </div>
      <div class="label-jp">銘木図鑑</div>
      <div class="rule"></div>
      <div class="label-en">Encyclopedia</div>
      <div class="sub-desc">銘木を深く知る</div>
    </div>
  </div>

  <!-- ④ 新作・入荷 -->
  <div class="cell">
    <div class="panel">
      <div class="sakura-accent"></div>
      <div class="icon">
        <!-- 桜アイコン -->
        <svg width="90" height="90" viewBox="0 0 100 100" fill="none">
          <ellipse cx="50" cy="22" rx="12" ry="20" stroke="rgba(255,255,255,0.85)" stroke-width="1.8" transform="rotate(0 50 50)"/>
          <ellipse cx="50" cy="22" rx="12" ry="20" stroke="rgba(255,255,255,0.85)" stroke-width="1.8" transform="rotate(72 50 50)"/>
          <ellipse cx="50" cy="22" rx="12" ry="20" stroke="rgba(255,255,255,0.85)" stroke-width="1.8" transform="rotate(144 50 50)"/>
          <ellipse cx="50" cy="22" rx="12" ry="20" stroke="rgba(255,255,255,0.85)" stroke-width="1.8" transform="rotate(216 50 50)"/>
          <ellipse cx="50" cy="22" rx="12" ry="20" stroke="rgba(255,255,255,0.85)" stroke-width="1.8" transform="rotate(288 50 50)"/>
          <circle cx="50" cy="50" r="6" fill="rgba(244,184,200,0.9)"/>
        </svg>
      </div>
      <div class="label-jp">新作・入荷</div>
      <div class="rule"></div>
      <div class="label-en">New Arrival</div>
      <div class="sub-desc">最新作をいち早く</div>
    </div>
  </div>

  <!-- ⑤ 職人に相談 -->
  <div class="cell">
    <div class="panel">
      <div class="sakura-accent"></div>
      <div class="icon">
        <svg width="90" height="90" viewBox="0 0 100 100" fill="none">
          <path d="M14,14 Q14,7 21,7 L79,7 Q86,7 86,14 L86,62 Q86,69 79,69 L38,69 L14,90 L14,69 Z" stroke="rgba(255,255,255,0.85)" stroke-width="2" stroke-linejoin="round"/>
          <line x1="28" y1="30" x2="72" y2="30" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
          <line x1="28" y1="46" x2="55" y2="46" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
        </svg>
      </div>
      <div class="label-jp">職人に相談</div>
      <div class="rule"></div>
      <div class="label-en">Consultation</div>
      <div class="sub-desc">贈り物・用途をご提案</div>
    </div>
  </div>

  <!-- ⑥ 注文状況 -->
  <div class="cell">
    <div class="panel">
      <div class="sakura-accent"></div>
      <div class="icon">
        <svg width="90" height="90" viewBox="0 0 100 100" fill="none">
          <rect x="10" y="34" width="80" height="60" stroke="rgba(255,255,255,0.85)" stroke-width="2"/>
          <polyline points="10,34 50,16 90,34" stroke="rgba(255,255,255,0.85)" stroke-width="2" stroke-linejoin="round"/>
          <line x1="50" y1="16" x2="50" y2="34" stroke="rgba(255,255,255,0.85)" stroke-width="2"/>
          <line x1="28" y1="56" x2="72" y2="56" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
          <line x1="38" y1="68" x2="62" y2="68" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
        </svg>
      </div>
      <div class="label-jp">注文状況</div>
      <div class="rule"></div>
      <div class="label-en">Order Status</div>
      <div class="sub-desc">ご注文の確認</div>
    </div>
  </div>

</div>
</body>
</html>
